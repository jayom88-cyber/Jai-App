<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Jai | OmniStack Digital Assistant</title>
    <!-- Tailwind CDN activated for immediate Firebase field-testing -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* =========================================================================
           CORE SYSTEM ARCHITECTURE & FIXED UTILITY DESIGN TOKENS
           ========================================================================= */
        :root {
            --bg-color: #020208;
            --surface-bg: rgba(8, 8, 24, 0.65);
            --border-color: rgba(0, 255, 255, 0.25);
            --text-color: #f1f5f9;
            --accent-color: #00ffff;
            --accent-glow: rgba(0, 255, 255, 0.45);
            --galaxy-glow-1: rgba(26, 21, 60, 0.5);
            --galaxy-glow-2: rgba(0, 242, 254, 0.2);
            --glow-glass: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
        }

        body.theme-sepia {
            --bg-color: #f4ecd8;
            --surface-bg: rgba(229, 219, 194, 0.75);
            --border-color: rgba(139, 90, 43, 0.3);
            --text-color: #4a3319;
            --accent-color: #8b5a2b;
            --accent-glow: rgba(139, 90, 43, 0.3);
            --galaxy-glow-1: rgba(210, 180, 140, 0.3);
            --galaxy-glow-2: rgba(139, 90, 43, 0.12);
            --glow-glass: 0 4px 16px 0 rgba(139, 90, 43, 0.1);
        }

        body.theme-light {
            --bg-color: #f1f5f9;
            --surface-bg: rgba(255, 255, 255, 0.85);
            --border-color: rgba(203, 213, 225, 1);
            --text-color: #0f172a;
            --accent-color: #4f46e5;
            --accent-glow: rgba(79, 70, 229, 0.3);
            --galaxy-glow-1: rgba(148, 163, 184, 0.2);
            --galaxy-glow-2: rgba(79, 70, 229, 0.08);
            --glow-glass: 0 8px 32px 0 rgba(100, 116, 139, 0.05);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body, main, div, button, img {
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease, transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            height: 100dvh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .glass-panel {
            background-color: var(--surface-bg);
            border: 1px solid var(--border-color);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.1); }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.15); border-radius: 2px; }

        @keyframes galaxyRotate {
            0% { transform: translate3d(-50%, -50%, 0) rotate(0deg) scale3d(1, 1, 1); }
            50% { transform: translate3d(-50%, -50%, 0) rotate(180deg) scale3d(1.1, 1.1, 1); }
            100% { transform: translate3d(-50%, -50%, 0) rotate(360deg) scale3d(1, 1, 1); }
        }

        .galaxy-stage {
            position: absolute; top: 50%; left: 50%; width: 200%; height: 200%; z-index: 0;
            transform: translate3d(-50%, -50%, 0); pointer-events: none; will-change: transform;
            animation: galaxyRotate 60s linear infinite;
            background: 
                radial-gradient(circle at 50% 50%, var(--galaxy-glow-1) 0%, transparent 50%),
                radial-gradient(circle at 60% 60%, var(--galaxy-glow-2) 0%, transparent 60%);
            filter: blur(40px);
        }

        .stage-container {
            flex: 1; width: 100%; max-width: 1400px; margin: 0 auto;
            display: grid; grid-template-columns: 320px 1fr; gap: 16px; padding: 16px; min-height: 0; z-index: 10;
        }

        aside { display: flex; flex-direction: column; gap: 16px; min-height: 0; overflow-y: auto; }
        .panel-card { border-radius: 16px; padding: 16px; display: flex; flex-direction: column; box-shadow: var(--glow-glass); }
        
        main {
            border-radius: 24px; padding: 16px; display: flex; flex-direction: column; align-items: center; justify-content: space-between;
            position: relative; overflow: hidden; min-height: 0; box-shadow: inset 0 0 40px rgba(0,0,0,0.5);
        }

        @media (max-width: 992px) {
            .stage-container { display: flex; flex-direction: column; overflow-y: auto; padding-bottom: 20px; }
            main { order: 1; min-height: 60vh; flex: 0 0 auto; }
            aside { order: 2; margin-top: 16px; overflow: visible; }
        }

        .avatar-lens { position: relative; flex: 1; width: 100%; display: flex; align-items: center; justify-content: center; min-height: 280px; padding: 20px 0; z-index: 5; }
        .skin-layer { position: absolute; max-height: 100%; max-width: 90%; object-fit: contain; opacity: 0; z-index: 1; border-radius: 24px; will-change: opacity, transform; transform: scale3d(0.95, 0.95, 1); pointer-events: none; transition: opacity 0.5s ease, transform 0.5s ease; }
        
        @keyframes corePulse {
            0%, 100% { transform: scale3d(1, 1, 1); filter: drop-shadow(0 0 15px var(--accent-color)) rgba(0, 255, 255, 0.3); }
            50% { transform: scale3d(1.04, 1.04, 1); filter: drop-shadow(0 0 25px var(--accent-color)) brightness(1.15); }
        }
        .skin-layer.active { opacity: 1; z-index: 2; animation: corePulse 4s infinite; pointer-events: auto;}

        .eq-matrix { display: flex; align-items: center; justify-content: center; gap: 6px; height: 32px; margin-bottom: 16px; z-index: 10;}
        .eq-bar { width: 4px; height: 6px; background-color: var(--accent-color); border-radius: 2px; transition: height 0.075s linear; }
        .transcript-deck { width: 100%; background: rgba(0, 0, 0, 0.75); border: 1px solid var(--border-color); padding: 16px; border-radius: 16px; z-index: 10; backdrop-filter: blur(10px); }

        header { width: 100%; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; z-index: 30; border-bottom: 1px solid var(--border-color); }
        .brand-block { display: flex; align-items: center; gap: 12px; }
        .brand-monogram { width: 36px; height: 36px; border-radius: 10px; background: linear-gradient(135deg, #00ffff, #4f46e5); display: flex; align-items: center; justify-content: center; font-weight: 900; color: #ffffff; font-size: 1.1rem; }
        
        .hub-controls { display: flex; align-items: center; gap: 12px; }
        .btn-pill-group { background: rgba(0, 0, 0, 0.4); border: 1px solid var(--border-color); border-radius: 8px; padding: 4px; display: flex; flex-wrap: wrap; gap: 4px; justify-content: center;}
        .btn-pill { background: transparent; border: none; color: var(--text-color); opacity: 0.5; padding: 6px 12px; font-size: 0.65rem; font-weight: 700; text-transform: uppercase; border-radius: 6px; cursor: pointer; transition: all 0.2s ease;}
        .btn-pill.active { background: rgba(255, 255, 255, 0.15); color: var(--accent-color); opacity: 1; }
        
        .status-tag { display: flex; align-items: center; gap: 6px; font-size: 0.65rem; font-weight: 700; text-transform: uppercase; }
        .status-dot { width: 8px; height: 8px; background-color: #10b981; border-radius: 50%; }
        .status-dot.active { animation: corePulse 1.5s infinite; } 

        footer { width: 100%; padding: 16px 24px; display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; z-index: 30; border-top: 1px solid var(--border-color); gap: 16px; }
        .btn-action-square { width: 44px; height: 44px; font-size: 1.2rem; border: 1px solid var(--border-color); background: rgba(0, 0, 0, 0.3); border-radius: 12px; display: flex; align-items: center; justify-content: center; color: var(--text-color); cursor: pointer;}
        
        .mic-active { animation: pulse-red 1.5s infinite; color: #ef4444 !important; border-color: #ef4444 !important; }
        @keyframes pulse-red {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 16px; width: 16px; border-radius: 50%; background: var(--accent-color); cursor: pointer; margin-top: -6px; box-shadow: 0 0 10px var(--accent-color); }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; }
    </style>
</head>

    <!-- =========================================================================
         OMNISTACK JAVASCRIPT MASTER SYSTEM LOGIC

    <script>
        // --- VISUAL SYSTEM CONTROLLER ---
        const SystemApp = (() => {
            let state = { is_forked_timeline: false };

            const setTheme = (theme) => {
                document.body.classList.remove('theme-dark', 'theme-sepia', 'theme-light');
                document.body.classList.add('theme-' + theme);
                ['dark', 'sepia', 'light'].forEach(opt => {
                    const btn = document.getElementById(`theme-${opt}-btn`);
                    if (btn) btn.classList.toggle('active', opt === theme);
                });
            };

            const toggleSkin = (targetSkin) => {
                ['neutral', 'real', 'pixar', 'female'].forEach(skin => {
                    const el = document.getElementById(`skin-${skin}`);
                    const btn = document.getElementById(`skin-btn-${skin}`);
                    if (el && btn) {
                        if (skin === targetSkin) {
                            el.classList.add('active'); btn.classList.add('active');
                        } else {
                            el.classList.remove('active'); btn.classList.remove('active');
                        }
                    }
                });
            };

            const forkTimeline = () => {
                state.is_forked_timeline = !state.is_forked_timeline;
                const container = document.getElementById('fork-indicator-container');
                const line = document.getElementById('transcript-line');

                if (state.is_forked_timeline) {
                    container.innerHTML = `<span class="fork-badge text-[8px] bg-amber-500/20 text-amber-500 px-2 py-0.5 rounded ml-2 border border-amber-500/40">FORKED</span>`;
                    line.innerText = `"Spawning isolated scenario timeline..."`;
                } else {
                    container.innerHTML = ``;
                    line.innerText = `"Context reverted to parent timeline."`;
                }
            };

            const executeVaultCheckout = () => {
                document.getElementById('transcript-line').innerText = `"Redirecting to Stripe Vault Checkout..."`;
            };

            return { setTheme, toggleSkin, forkTimeline, executeVaultCheckout };
        })();

        // --- CORE ENGINE INITIALIZATION ---
        document.addEventListener('DOMContentLoaded', () => {
            
            const aiPromptInput = document.getElementById('ai-prompt-input');
            const generateAiBtn = document.getElementById('generate-ai-btn');
            const micBtn = document.getElementById('mic-btn');
            const promptSpeakerBtn = document.getElementById('prompt-speaker-btn');
            
            const ttsInput = document.getElementById('tts-input');
            const playBtn = document.getElementById('play-btn');
            const playIcon = document.getElementById('play-icon');
            const playText = document.getElementById('play-text');
            const stopBtn = document.getElementById('stop-btn');
            
            const statusDisplay = document.getElementById('tts-status');
            const transcriptLine = document.getElementById('transcript-line');
            
            const voiceSelect = document.getElementById('voice-select');
            const langSelect = document.getElementById('lang-select');
            const lexiconSelect = document.getElementById('lexicon-select');
            const lexiconInjectBtn = document.getElementById('lexicon-inject-btn');

            let isLanguageLocked = false;
            let activePersonalityMode = "Short & Punchy"; // Baseline State Token

            // ==========================================
            // LOCAL TESTING DATABANK (Fuzzy Keyword Matching targets)
            // ==========================================
            const mockDatabase = [
                { mode: "Short & Punchy", topic: "traffic jams", response: "Traffic jams: because moving forward at 2 mph is exactly how I planned to experience the city today." },
                { mode: "Genius Philosopher", topic: "traffic jams", response: "We sit trapped in iron carapaces, mourning lost time while processing the macro-entropy of civil infrastructure development." },
                { mode: "Comedic Roast", topic: "traffic jams", response: "NYC traffic is the only place on Earth where a parked car and an active highway look completely indistinguishable." }
            ];

            // ==========================================
            // HARDCODED PERSONALITY TOGGLES (UI-Dictated Flow First)
            // ==========================================
            const setupPersonalityButtons = () => {
                const modes = [
                    { id: 'mode-short', name: 'Short & Punchy' },
                    { id: 'mode-philosopher', name: 'Genius Philosopher' },
                    { id: 'mode-roast', name: 'Comedic Roast' }
                ];

                modes.forEach(m => {
                    const btn = document.getElementById(m.id);
                    if (btn) {
                        btn.addEventListener('click', () => {
                            activePersonalityMode = m.name;
                            console.log(`FSM Personality Shift: -> ${activePersonalityMode}`);
                            
                            // Re-index layout classes on UI loop
                            modes.forEach(mode => {
                                const target = document.getElementById(mode.id);
                                if (target) {
                                    target.className = "mode-toggle-btn bg-transparent text-slate-400 text-xs font-bold py-2 px-6 rounded-lg border border-slate-700 transition-all hover:text-white";
                                }
                            });
                            btn.className = "mode-toggle-btn bg-indigo-600 text-white text-xs font-bold py-2 px-6 rounded-lg border border-indigo-500 transition-all shadow-[0_0_10px_rgba(79,110,229,0.3)]";
                            transcriptLine.innerText = `"Personality profile locked: ${activePersonalityMode}"`;
                        });
                    }
                });
            };
            setupPersonalityButtons();

            // EQ Visualizer driver
            let eqInterval = null;
            const runVisualizer = (run) => {
                const bars = document.querySelectorAll('.eq-bar');
                if (!run) {
                    clearInterval(eqInterval);
                    bars.forEach(bar => bar.style.height = '6px');
                    return;
                }
                clearInterval(eqInterval);
                eqInterval = setInterval(() => {
                    bars.forEach(bar => {
                        const magnitude = Math.floor(Math.random() * 26) + 6;
                        bar.style.height = magnitude + 'px';
                    });
                }, 80);
            };

            // Anti-Gravity language controller
            const antiGravityLanguageDetect = (text) => {
                if (!text || isLanguageLocked) return;
                if (/[\u0900-\u097F]/.test(text)) {
                    langSelect.value = 'hi';
                } else if (/[áéíóúñ¿¡]/i.test(text)) {
                    langSelect.value = 'es';
                } else {
                    langSelect.value = 'en';
                }
                activeLang = langSelect.value;
                updateVoiceList();
            };

            // Speech-to-Text Native Interface
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            let recognition = null;
            let isRecording = false;

            if (SpeechRecognition) {
                recognition = new SpeechRecognition();
                recognition.continuous = false;
                recognition.interimResults = false;
                
                recognition.onstart = () => {
                    isRecording = true;
                    micBtn.classList.add('mic-active');
                    aiPromptInput.placeholder = "Listening... Speak now.";
                    runVisualizer(true);
                };
                
                recognition.onresult = (event) => {
                    const transcript = event.results[0][0].transcript;
                    aiPromptInput.value = transcript;
                    transcriptLine.innerText = `"${transcript}"`;
                };
                
                recognition.onend = () => {
                    isRecording = false;
                    micBtn.classList.remove('mic-active');
                    runVisualizer(false);
                };

                micBtn.addEventListener('click', () => {
                    if (isRecording) { recognition.stop(); } 
                    else { recognition.start(); }
                });
            }

            // ==========================================
            // ROUTING HANDSHAKE: FUZZY INTERSECTION
            // ==========================================
            generateAiBtn.addEventListener('click', async () => {
                const val = aiPromptInput.value.trim();
                if (!val) return;

                generateAiBtn.disabled = true;
                runVisualizer(true);
                transcriptLine.innerText = `"Parsing routing parameters..."`;

                const stopWords = new Set(['a', 'the', 'is', 'in', 'to', 'of', 'for', 'and', 'my', 'your', 'i', 'it', 'with', 'on', 'at']);
                const getKeywords = (str) => {
                    return str.toLowerCase().split(/\W+/).filter(word => word.length > 2 && !stopWords.has(word));
                };

                const userKeywords = getKeywords(val);

                // Run structural search against mock local db matching active layout profile
                let targetMatch = mockDatabase.find(entry => {
                    if (entry.mode !== activePersonalityMode) return false;
                    
                    const entryTopicLower = entry.topic.toLowerCase();
                    const valLower = val.toLowerCase();

                    if (valLower.includes(entryTopicLower)) return true;

                    const topicKeywords = getKeywords(entry.topic);
                    return userKeywords.some(uKw => entryTopicLower.includes(uKw)) || 
                           topicKeywords.some(tKw => valLower.includes(tKw));
                });

                if (targetMatch) {
                    console.log(`Local Match Engaged: ${targetMatch.topic}`);
                    ttsInput.value = targetMatch.response;
                    antiGravityLanguageDetect(targetMatch.response);
                    transcriptLine.innerText = `"Local match found via Offline Array."`;
                    generateAiBtn.disabled = false;
                    runVisualizer(false);
                    setTimeout(() => playBtn.click(), 200); // Auto fire execution trace
                } else {
                    // Fallback to Serverless Endpoint Proxy
                    console.log("No local keyword intersection. Routing to serverless proxy gateway.");
                    try {
                        const response = await fetch('/api/gemini', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ prompt: val, mode: activePersonalityMode })
                        });
                        if (!response.ok) throw new Error(`HTTP System Error: ${response.status}`);
                        const data = await response.json();
                        if (data.text) {
                            ttsInput.value = data.text;
                            antiGravityLanguageDetect(data.text);
                            transcriptLine.innerText = `"Payload secured via proxy layer."`;
                        }
                    } catch (error) {
                        transcriptLine.innerText = `"Gateway execution timeout. Verify server parameters."`;
                    } finally {
                        generateAiBtn.disabled = false;
                        runVisualizer(false);
                    }
                }
            });

            // ==========================================
            // LOCAL SPEECH SYNTHESIS ENGINE
            // ==========================================
            let allSystemVoices = [];
            let ttsState = 'idle'; 
            let currentChunks = [];

            function updateVoiceList() {
                allSystemVoices = window.speechSynthesis.getVoices();
                if (allSystemVoices.length === 0) return;
                const filteredVoices = allSystemVoices.filter(v => v.lang.startsWith(langSelect.value));
                voiceSelect.innerHTML = '';
                filteredVoices.forEach(voice => {
                    const opt = document.createElement('option');
                    opt.value = allSystemVoices.indexOf(voice); 
                    opt.textContent = `${voice.name} (${voice.lang})`;
                    voiceSelect.appendChild(opt);
                });
            }

            langSelect.addEventListener('change', () => {
                isLanguageLocked = true;
                updateVoiceList();
            });

            if (speechSynthesis.onvoiceschanged !== undefined) speechSynthesis.onvoiceschanged = updateVoiceList;

            playBtn.addEventListener('click', () => {
                const text = ttsInput.value.trim();
                if (!text) return;
                speechSynthesis.cancel();
                
                const utterance = new SpeechSynthesisUtterance(text);
                if (voiceSelect.value !== "") {
                    utterance.voice = allSystemVoices[voiceSelect.value];
                }
                utterance.rate = parseFloat(document.getElementById('rate').value);
                utterance.pitch = parseFloat(document.getElementById('pitch').value);
                utterance.volume = parseFloat(document.getElementById('volume').value);

                utterance.onstart = () => { statusDisplay.textContent = "SPEAKING"; runVisualizer(true); };
                utterance.onend = () => { statusDisplay.textContent = "IDLE"; runVisualizer(false); };
                
                speechSynthesis.speak(utterance);
            });

            stopBtn.addEventListener('click', () => { window.speechSynthesis.cancel(); statusDisplay.textContent = "IDLE"; runVisualizer(false); });
        });
    </script>
</body>
</html>
