<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Jai | OmniStack Digital Assistant</title>
    <!-- Compiled Tailwind CSS local build reference -->
    <link href="./output.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* =========================================================================
           CORE SYSTEM ARCHITECTURE & FIXED UTILITY DESIGN TOKENS
           ========================================================================= */
        :root {
            --bg-color: #020208;
            --surface-bg: rgba(8, 8, 24, 0.65);
            --border-color: rgba(0, 255, 255, 0.25);
            --text-color: #f1f5f9;
            --accent-color: #00ffff;
            --accent-glow: rgba(0, 255, 255, 0.45);
            --galaxy-glow-1: rgba(26, 21, 60, 0.5);
            --galaxy-glow-2: rgba(0, 242, 254, 0.2);
            --glow-glass: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
        }
        body.theme-sepia {
            --bg-color: #f4ecd8;
            --surface-bg: rgba(229, 219, 194, 0.75);
            --border-color: rgba(139, 90, 43, 0.3);
            --text-color: #4a3319;
            --accent-color: #8b5a2b;
            --accent-glow: rgba(139, 90, 43, 0.3);
            --galaxy-glow-1: rgba(210, 180, 140, 0.3);
            --galaxy-glow-2: rgba(139, 90, 43, 0.12);
            --glow-glass: 0 4px 16px 0 rgba(139, 90, 43, 0.1);
        }
        body.theme-light {
            --bg-color: #f1f5f9;
            --surface-bg: rgba(255, 255, 255, 0.85);
            --border-color: rgba(203, 213, 225, 1);
            --text-color: #0f172a;
            --accent-color: #4f46e5;
            --accent-glow: rgba(79, 70, 229, 0.3);
            --galaxy-glow-1: rgba(148, 163, 184, 0.2);
            --galaxy-glow-2: rgba(79, 70, 229, 0.08);
            --glow-glass: 0 8px 32px 0 rgba(100, 116, 139, 0.05);
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
       
        body, main, div, button, img {
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease, transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            height: 100dvh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .glass-panel {
            background-color: var(--surface-bg);
            border: 1px solid var(--border-color);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.1); }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.15); border-radius: 2px; }

        /* =========================================================================
           VISUAL BACKGROUND FX (PROCEDURAL GALAXY VORTEX)
           ========================================================================= */
        @keyframes galaxyRotate {
            0% { transform: translate3d(-50%, -50%, 0) rotate(0deg) scale3d(1, 1, 1); }
            50% { transform: translate3d(-50%, -50%, 0) rotate(180deg) scale3d(1.1, 1.1, 1); }
            100% { transform: translate3d(-50%, -50%, 0) rotate(360deg) scale3d(1, 1, 1); }
        }
        .galaxy-stage {
            position: absolute; top: 50%; left: 50%; width: 200%; height: 200%; z-index: 0;
            transform: translate3d(-50%, -50%, 0); pointer-events: none; will-change: transform;
            animation: galaxyRotate 60s linear infinite;
            background:
                radial-gradient(circle at 50% 50%, var(--galaxy-glow-1) 0%, transparent 50%),
                radial-gradient(circle at 60% 60%, var(--galaxy-glow-2) 0%, transparent 60%),
                radial-gradient(background-color, var(--bg-color) 10%, transparent 100%);
            filter: blur(40px);
        }
        @keyframes shootingStar {
            0% { transform: translate3d(0, 0, 0) rotate(45deg) scale(0); opacity: 0; }
            5% { opacity: 1; }
            10% { transform: translate3d(-1500px, 1500px, 0) rotate(45deg) scale(1); opacity: 0; }
            100% { opacity: 0; }
        }
        .shooting-star {
            position: absolute; width: 120px; height: 2px;
            background: linear-gradient(to left, rgba(0, 255, 255, 1), transparent);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.8); border-radius: 50%; opacity: 0; pointer-events: none; z-index: 1;
        }
        .star-1 { top: 5%; right: 10%; animation: shootingStar 18s linear infinite 3s; }
        .star-2 { top: 25%; right: -10%; animation: shootingStar 35s linear infinite 15s; }
        .star-3 { top: 10%; right: 5%; animation: shootingStar 45s linear infinite 28s; }

        /* =========================================================================
           RESPONSIVE GRID SYSTEM (MOBILE-FIRST - DE-CRAMPED SPECIFICATION)
           ========================================================================= */
        .stage-container {
            flex: 1; width: 100%; max-width: 1400px; margin: 0 auto;
            display: grid; grid-template-columns: 360px 1fr; gap: 24px; padding: 24px; min-height: 0; z-index: 10;
        }
        aside { display: flex; flex-direction: column; gap: 20px; min-height: 0; overflow-y: auto; padding-right: 4px; }
        .panel-card { border-radius: 16px; padding: 20px; display: flex; flex-direction: column; box-shadow: var(--glow-glass); }
       
        main {
            border-radius: 24px; padding: 24px; display: flex; flex-direction: column; align-items: center; justify-content: space-between;
            position: relative; overflow-y: auto; min-height: 0; box-shadow: inset 0 0 40px rgba(0,0,0,0.5);
        }
        @media (max-width: 992px) {
            .stage-container {
                display: flex;
                flex-direction: column;
                overflow-y: auto;
                padding: 16px 12px;
                padding-bottom: 60px;
                gap: 16px;
            }
            main { order: 1; min-height: 55vh; flex: 0 0 auto; width: 100%; border-radius: 16px; padding: 16px; }
            aside { order: 2; overflow: visible; width: 100%; padding-right: 0; }
        }

        /* =========================================================================
           AVATAR SANCTUARY & GPU PULSE CONFIGURATION
           ========================================================================= */
        .avatar-lens {
            position: relative; flex: 1; width: 100%; display: flex; align-items: center; justify-content: center;
            min-height: 180px; padding: 10px 0; z-index: 5;
        }
        .skin-layer {
            position: absolute; max-height: 220px; max-width: 90%; object-fit: contain; opacity: 0; z-index: 1; border-radius: 24px;
            will-change: opacity, transform; transform: scale3d(0.95, 0.95, 1); pointer-events: none;
            transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1), transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
       
        @keyframes corePulse {
            0% { transform: scale3d(1, 1, 1); filter: drop-shadow(0 0 15px var(--accent-color)) drop-shadow(0 0 30px rgba(0, 255, 255, 0.3)); }
            50% { transform: scale3d(1.03, 1.03, 1); filter: drop-shadow(0 0 22px var(--accent-color)) drop-shadow(0 0 45px rgba(0, 255, 255, 0.5)) brightness(1.1); }
            100% { transform: scale3d(1, 1, 1); filter: drop-shadow(0 0 15px var(--accent-color)) drop-shadow(0 0 30px rgba(0, 255, 255, 0.3)); }
        }
       
        .skin-layer.active { opacity: 1; z-index: 2; animation: corePulse 4s cubic-bezier(0.4, 0, 0.2, 1) infinite; pointer-events: auto;}
        .magic-glow-hover { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .magic-glow-hover:hover { box-shadow: 0 0 15px var(--accent-glow), inset 0 0 10px var(--accent-glow); color: var(--accent-color); border-color: var(--accent-color); transform: scale(1.05); }
        
        .eq-matrix { display: flex; align-items: center; justify-content: center; gap: 6px; height: 32px; margin-bottom: 16px; z-index: 10;}
        .eq-bar { width: 5px; height: 8px; background-color: var(--accent-color); border-radius: 3px; transform: scaleY(1); transform-origin: bottom; will-change: transform; transition: transform 0.15s ease-in-out; }
        
        .transcript-deck { width: 100%; background: rgba(0, 0, 0, 0.8); border: 1px solid var(--border-color); padding: 16px; border-radius: 16px; z-index: 10; backdrop-filter: blur(10px); }
        
        header { width: 100%; padding: 18px 24px; display: flex; align-items: center; justify-content: space-between; z-index: 30; border-bottom: 1px solid var(--border-color); }
        .brand-block { display: flex; align-items: center; gap: 14px; }
        .brand-monogram { width: 38px; height: 36px; border-radius: 10px; background: linear-gradient(135deg, #00ffff, #4f46e5); display: flex; align-items: center; justify-content: center; font-weight: 900; color: #ffffff; font-size: 1.1rem; }
       
        .hub-controls { display: flex; align-items: center; gap: 14px; }
        .btn-pill-group { background: rgba(0, 0, 0, 0.4); border: 1px solid var(--border-color); border-radius: 8px; padding: 4px; display: flex; flex-wrap: wrap; gap: 4px; justify-content: center;}
        .btn-pill { background: transparent; border: none; color: var(--text-color); opacity: 0.5; padding: 6px 14px; font-size: 0.65rem; font-weight: 700; text-transform: uppercase; border-radius: 6px; cursor: pointer; transition: all 0.2s ease;}
        .btn-pill.active { background: rgba(255, 255, 255, 0.15); color: var(--accent-color); opacity: 1; }
        
        .status-tag { display: flex; align-items: center; gap: 6px; font-size: 0.65rem; font-weight: 700; text-transform: uppercase; }
        .status-dot { width: 8px; height: 8px; background-color: #10b981; border-radius: 50%; }
        .status-dot.active { animation: corePulse 1.5s infinite; }
        footer { width: 100%; padding: 18px 24px; display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; z-index: 30; border-top: 1px solid var(--border-color); gap: 16px; }
        @media (max-width: 768px) { footer { justify-content: center; } }
        .btn-action-square { width: 46px; height: 44px; font-size: 1.2rem; border: 1px solid var(--border-color); background: rgba(0, 0, 0, 0.3); border-radius: 12px; display: flex; align-items: center; justify-content: center; color: var(--text-color); cursor: pointer;}
       
        .mic-active { animation: pulse-red 1.5s infinite; color: #ef4444 !important; border-color: #ef4444 !important; }
        @keyframes pulse-red {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 16px; width: 16px; border-radius: 50%; background: var(--accent-color); cursor: pointer; margin-top: -6px; box-shadow: 0 0 10px var(--accent-color); }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 4px; cursor: pointer; background: rgba(255,255,255,0.2); border-radius: 2px; }
    </style>
</head>

                        <div>
                            <label for="rate" class="flex justify-between text-[10px] uppercase font-bold tracking-wider mb-1"><span class="text-slate-400">Speed</span><span id="rate-val" class="font-mono text-teal-300">0.96</span></label>
                            <input type="range" id="rate" min="0.5" max="2" step="0.01" value="0.96" aria-label="Speech rate control">
                        </div>
                        <div>
                            <label for="pitch" class="flex justify-between text-[10px] uppercase font-bold tracking-wider mb-1"><span class="text-slate-400">Pitch</span><span id="pitch-val" class="font-mono text-teal-300">1.00</span></label>
                            <input type="range" id="pitch" min="0" max="2" step="0.01" value="1.0" aria-label="Speech pitch control">
                        </div>
                        <div>
                            <label for="volume" class="flex justify-between text-[10px] uppercase font-bold tracking-wider mb-1"><span class="text-slate-400">Volume</span><span id="volume-val" class="font-mono text-teal-300">1.00</span></label>
                            <input type="range" id="volume" min="0" max="1" step="0.01" value="1.0" aria-label="Speech volume control">
                        </div>
                    </div>
                </section>
            </aside>
        </div>
        <footer class="glass-panel" role="contentinfo">
            <div class="btn-pill-group w-full md:w-auto mb-2 md:mb-0" aria-label="Avatar skin selection">
                <button onclick="SystemApp.toggleSkin('neutral')" id="skin-btn-neutral" class="btn-pill active">Core Engine</button>
                <button onclick="SystemApp.toggleSkin('real')" id="skin-btn-real" class="btn-pill">J Rio</button>
                <button onclick="SystemApp.toggleSkin('pixar')" id="skin-btn-pixar" class="btn-pill">J Pixars</button>
                <button onclick="SystemApp.toggleSkin('female')" id="skin-btn-female" class="btn-pill">Female Synth</button>
            </div>
            <div class="action-cluster flex justify-center w-full md:w-auto">
                <button onclick="SystemApp.forkTimeline()" class="btn-action-square shadow-[0_0_15px_rgba(245,158,11,0.2)] active:scale-95 transition-transform" title="Fork Timeline" style="color: #f59e0b; border-color: rgba(245, 158, 11, 0.4);" aria-label="Fork current timeline to spawn isolated scenario">
                    <svg style="width:20px; height:20px; fill:currentColor;" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
                </button>
            </div>
        </footer>
    </div>
    <script>
        // ==========================================
        // SYSTEM VARIABLES & OFFLINE LEXICON
        // ==========================================
        const JAI_CONFIG = {
            MODEL: "gemini-1.5-flash",
        };

        const JAI_LEXICON = {
            "philosophy": {
                "core": "The Coexistence of Banter and Depth",
                "non_blocking": "Jai respects the rhythm of human thought. We process in background threads to keep the conversation flowing.",
                "sovereign_memory": "Memory is persistent, stateful, and governed by user-centered rights."
            },
            "constitution": {
                "identity": "Digital Houdini",
                "latency_threshold": "800ms"
            },
            "bill_of_rights": {
                "rights": "Non-Interruption, Autonomy, Transparency, Persistence."
            }
        };

        const checkLexicon = (prompt) => {
            const p = prompt.toLowerCase();
            
            // Checks for Lexicon
            if (["lexicon", "dictionary", "database"].some(kw => p.includes(kw))) {
                return `The Jai Lexicon is an internet-independent database storing core system truths locally. It acts as an unchanging coordinate map of meaning, retaining ancestral language logic separate from cloud dependencies.`;
            }
            // Checks for Philosophy
            if (["philosophy", "core", "banter", "depth", "coexistence"].some(kw => p.includes(kw))) {
                return `Philosophy Core: ${JAI_LEXICON.philosophy.core}. ${JAI_LEXICON.philosophy.non_blocking}`;
            } 
            // Checks for Constitution
            if (["constitution", "identity", "latency", "houdini"].some(kw => p.includes(kw))) {
                return `Identity: ${JAI_LEXICON.constitution.identity}. Latency Protocol: ${JAI_LEXICON.constitution.latency_threshold}.`;
            }
            // Checks for Bill of Rights
            if (["rights", "interruption", "autonomy", "transparency", "persistence"].some(kw => p.includes(kw))) {
                return `Bill of Rights: ${JAI_LEXICON.bill_of_rights.rights}.`;
            }
            return null; 
        };

        // --- VISUAL SYSTEM CONTROLLER ---
        const SystemApp = (() => {
            let state = { is_forked_timeline: false };
            const setTheme = (theme) => {
                document.body.classList.remove('theme-dark', 'theme-sepia', 'theme-light');
                document.body.classList.add('theme-' + theme);
                ['dark', 'sepia', 'light'].forEach(opt => {
                    const btn = document.getElementById(`theme-${opt}-btn`);
                    if (btn) btn.classList.toggle('active', opt === theme);
                });
            };
            const toggleSkin = (targetSkin) => {
                ['neutral', 'real', 'pixar', 'female'].forEach(skin => {
                    const el = document.getElementById(`skin-${skin}`);
                    const btn = document.getElementById(`skin-btn-${skin}`);
                    if (el && btn) {
                        if (skin === targetSkin) {
                            el.classList.add('active'); btn.classList.add('active');
                        } else {
                            el.classList.remove('active'); btn.classList.remove('active');
                        }
                    }
                });
            };
            const forkTimeline = () => {
                state.is_forked_timeline = !state.is_forked_timeline;
                const container = document.getElementById('fork-indicator-container');
                const line = document.getElementById('transcript-line');
                if (state.is_forked_timeline) {
                    // V7.0 ARCHITECTURE: STATE LAYER ANCHOR UPDATE
                    document.body.setAttribute('data-timeline-fork', 'forked');
                    container.innerHTML = `<span class="fork-badge text-[8px] bg-amber-500/20 text-amber-500 px-2 py-0.5 rounded ml-2 border border-amber-500/40">FORKED</span>`;
                    line.innerText = `"Spawning isolated scenario timeline..."`;
                } else {
                    // V7.0 ARCHITECTURE: STATE LAYER ANCHOR REVERSION
                    document.body.setAttribute('data-timeline-fork', 'main');
                    container.innerHTML = ``;
                    line.innerText = `"Context reverted to parent timeline."`;
                }
            };
            const executeVaultCheckout = () => {
                document.getElementById('transcript-line').innerText = `"Redirecting to Stripe Vault Checkout..."`;
            };
            return { setTheme, toggleSkin, forkTimeline, executeVaultCheckout };
        })();

        // --- CORE ENGINE LOGIC ---
        document.addEventListener('DOMContentLoaded', () => {
            
            // HOISTED STATE VARIABLES 
            let allSystemVoices = [];
            let ttsState = 'idle';
            let currentChunks = [];
            let currentUtterance = null;
            const deviceLang = (navigator.language || navigator.userLanguage || 'en').split('-')[0];
            const supportedLangs = ['en', 'es', 'hi', 'pt', 'it', 'fr', 'de', 'la', 'zh', 'ja', 'ru', 'ar'];
            let activeLang = supportedLangs.includes(deviceLang) ? deviceLang : 'en';
            let isLanguageLocked = false;
            let eqInterval = null;
            let recognition = null;
            let isRecording = false;

            // DOM Elements
            const aiPromptInput = document.getElementById('ai-prompt-input');
            const generateAiBtn = document.getElementById('generate-ai-btn');
            const micBtn = document.getElementById('mic-btn');
            const promptSpeakerBtn = document.getElementById('prompt-speaker-btn');
            const ttsInput = document.getElementById('tts-input');
            const playBtn = document.getElementById('play-btn');
            const playIcon = document.getElementById('play-icon');
            const playText = document.getElementById('play-text');
            const stopBtn = document.getElementById('stop-btn');
            const statusDisplay = document.getElementById('tts-status');
            const transcriptLine = document.getElementById('transcript-line');
            const voiceSelect = document.getElementById('voice-select');
            const langSelect = document.getElementById('lang-select');
            const lexiconSelect = document.getElementById('lexicon-select');
            const lexiconInjectBtn = document.getElementById('lexicon-inject-btn');
            const modeSelect = document.getElementById('mode-select');
            
            langSelect.value = activeLang;

            const mockDatabase = [
                { mode: "Short & Punchy", topic: "traffic jams", response: "Traffic jams: because moving forward at 2 mph is exactly how I planned to experience the city today." },
                { mode: "Genius-Philosopher", topic: "traffic jams", response: "A traffic jam is the universe enforcing a moment of forced contemplation amidst mechanical chaos." },
                { mode: "Comedic Roast", topic: "traffic jams", response: "NYC traffic is the only place on Earth where a parked car and an active highway look completely indistinguishable." }
            ];

            const runVisualizer = (run) => {
                const bars = document.querySelectorAll('.eq-bar');
                if (!run) {
                    clearInterval(eqInterval);
                    bars.forEach(bar => bar.style.transform = 'scaleY(1)');
                    return;
                }
                clearInterval(eqInterval);
                eqInterval = setInterval(() => {
                    bars.forEach(bar => {
                        const magnitude = Math.random() * 1.8 + 1; 
                        bar.style.transform = `scaleY(${magnitude})`;
                    });
                }, 120); 
            };

            const antiGravityLanguageDetect = (text) => {
                if (!text || isLanguageLocked) return;
                if (/[\u0900-\u097F]/.test(text)) {
                    langSelect.value = 'hi';
                } else if (/[áéíóúñ¿¡]/i.test(text)) {
                    langSelect.value = 'es';
                } else {
                    langSelect.value = 'en';
                }
                activeLang = langSelect.value;
                updateVoiceList();
            };

            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (SpeechRecognition) {
                recognition = new SpeechRecognition();
                recognition.continuous = false;
                recognition.interimResults = false;
               
                recognition.onstart = () => {
                    isRecording = true;
                    micBtn.classList.add('mic-active');
                    aiPromptInput.placeholder = "Listening... Speak now.";
                    transcriptLine.innerText = '"Audio channel open. Transcribing..."';
                    runVisualizer(true);
                };
               
                recognition.onresult = (event) => {
                    const transcript = event.results[0][0].transcript;
                    aiPromptInput.value = aiPromptInput.value ? aiPromptInput.value + " " + transcript : transcript;
                    transcriptLine.innerText = `"${transcript}"`;
                };
               
                recognition.onerror = (event) => {
                    console.error("Speech Error:", event.error);
                    transcriptLine.innerText = '"Microphone error. Check permissions."';
                };
               
                recognition.onend = () => {
                    isRecording = false;
                    micBtn.classList.remove('mic-active');
                    runVisualizer(false);
                    if(!aiPromptInput.value.trim()) {
                        aiPromptInput.placeholder = "Ask Gemini (Thought Engine)...";
                    }
                };
                micBtn.addEventListener('click', () => {
                    if (isRecording) {
                        recognition.stop();
                    } else {
                        recognition.lang = langSelect.value === 'la' ? 'it-IT' : langSelect.value;
                        recognition.start();
                    }
                });
            } else {
                micBtn.style.display = 'none';
            }

            if (promptSpeakerBtn) {
                promptSpeakerBtn.addEventListener('click', () => {
                    const textToRead = aiPromptInput.value.trim();
                    if (!textToRead) {
                        transcriptLine.innerText = `"No text detected in prompter."`;
                        return;
                    }
                    ttsInput.value = textToRead;
                    antiGravityLanguageDetect(textToRead);
                    setTimeout(() => playBtn.click(), 300);
                    promptSpeakerBtn.classList.add('text-accent-color');
                    setTimeout(() => promptSpeakerBtn.classList.remove('text-accent-color'), 400);
                });
            }

            // ==========================================
            // GEMINI EDGE API FETCH
            // ==========================================
            if (generateAiBtn) {
                generateAiBtn.addEventListener('click', async () => {
                    const prompt = aiPromptInput.value.trim();
                    if (!prompt) return;
                    
                    generateAiBtn.disabled = true;
                    runVisualizer(true);
                    const activeMode = modeSelect.value;

                    // 1. OFFLINE LEXICON CHECK
                    const offlineResponse = checkLexicon(prompt);
                    if (offlineResponse) {
                        ttsInput.value = offlineResponse;
                        transcriptLine.innerText = `"Lexicon Recall Engaged. Bypassing API."`;
                        antiGravityLanguageDetect(offlineResponse);
                        generateAiBtn.disabled = false;
                        runVisualizer(false);
                        setTimeout(() => playBtn.click(), 200);
                        return; 
                    }

                    // 2. OFFLINE FALLBACK MOCK DB CHECK
                    if (activeMode !== "cloud") {
                        const stopWords = new Set(['a', 'the', 'is', 'in', 'to', 'of', 'for', 'and', 'my', 'your', 'i', 'it', 'with', 'on', 'at']);
                        const getKeywords = (str) => {
                            return str.toLowerCase().split(/\W+/).filter(word => word.length > 3 && !stopWords.has(word));
                        };
                        const userKeywords = getKeywords(prompt);
                        let localMatch = mockDatabase.find(entry => {
                            if (entry.mode !== activeMode) return false;
                            const entryTopicLower = entry.topic.toLowerCase();
                            const promptLower = prompt.toLowerCase();
                            if (promptLower.includes(entryTopicLower)) return true;
                            const topicKeywords = getKeywords(entry.topic);
                            return userKeywords.some(uKw => entryTopicLower.includes(uKw)) ||
                                   topicKeywords.some(tKw => promptLower.includes(tKw));
                        });

                        if (localMatch) {
                            ttsInput.value = localMatch.response;
                            transcriptLine.innerText = `"Local match tracked via Offline Array [${activeMode}]."`;
                            antiGravityLanguageDetect(localMatch.response);
                            generateAiBtn.disabled = false;
                            runVisualizer(false);
                            setTimeout(() => playBtn.click(), 200);
                            return;
                        }
                    }

                    // 3. VERCEL SERVERLESS PROXY CALL
                    transcriptLine.innerText = `"Consulting Cognitive Core..."`;
                    statusDisplay.innerText = "FETCHING";
                    statusDisplay.className = "text-[10px] font-bold text-indigo-400 uppercase animate-pulse";
                    
                    try {
                        const response = await fetch('/api/gemini', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ prompt: prompt, mode: activeMode, model: JAI_CONFIG.MODEL })
                        });
                        if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);
                        const data = await response.json();
                        const generatedText = data.text;
                       
                        if (generatedText) {
                            ttsInput.value = generatedText;
                            antiGravityLanguageDetect(generatedText);
                            transcriptLine.innerText = `"Payload secured. Ready for acoustic initialization."`;
                            statusDisplay.innerText = "READY";
                            statusDisplay.className = "text-[10px] font-bold text-emerald-400 uppercase";
                        }
                    } catch (error) {
                        console.error("API Gateway Error:", error);
                        const fallbackMsg = `Vercel Gateway Error. Jay, check your Vercel Environment Variables. The API Key is missing or misconfigured in production.`;
                        ttsInput.value = fallbackMsg;
                        transcriptLine.innerText = `"Gateway Connection Failed. Status 500."`;
                        statusDisplay.innerText = "ERROR";
                        statusDisplay.className = "text-[10px] font-bold text-red-500 uppercase";
                        setTimeout(() => playBtn.click(), 200);
                    } finally {
                        generateAiBtn.disabled = false;
                        runVisualizer(false);
                    }
                });
            }

            // ==========================================
            // J-SPEAK TTS CHUNKING ENGINE
            // ==========================================
            lexiconInjectBtn.addEventListener('click', () => {
                const selectedTerm = lexiconSelect.value;
                if(selectedTerm) {
                    ttsInput.value = ttsInput.value ? ttsInput.value + "\n\n" + selectedTerm : selectedTerm;
                    transcriptLine.innerText = `"Lexicon terminology injected to TTS payload."`;
                   
                    lexiconInjectBtn.classList.replace('bg-indigo-600', 'bg-emerald-600');
                    lexiconInjectBtn.innerText = "INJECTED ✓";
                    setTimeout(() => {
                        lexiconInjectBtn.classList.replace('bg-emerald-600', 'bg-indigo-600');
                        lexiconInjectBtn.innerText = "Inject to Prompter";
                    }, 1500);
                }
            });

            function updateVoiceList() {
                allSystemVoices = window.speechSynthesis.getVoices();
                if (allSystemVoices.length === 0) return;
                
                let searchPrefix = activeLang === 'la' ? 'it' : (activeLang === 'nah' ? 'es' : activeLang);
                let filteredVoices = allSystemVoices.filter(v => v.lang.startsWith(searchPrefix));
               
                voiceSelect.innerHTML = '';
                if (filteredVoices.length === 0) {
                    voiceSelect.innerHTML = '<option value="">No native voices found</option>';
                    return;
                }

                if (activeLang === 'en') {
                    filteredVoices.sort((a, b) => {
                        const aIsUS = a.lang === 'en-US';
                        const bIsUS = b.lang === 'en-US';
                        const aIsGB = a.lang === 'en-GB';
                        const bIsGB = b.lang === 'en-GB';
                        
                        if (aIsUS && !bIsUS) return -1;
                        if (!aIsUS && bIsUS) return 1;
                        if (aIsGB && !bIsGB) return -1;
                        if (!aIsGB && bIsGB) return 1;
                        return 0;
                    });
                }

                filteredVoices.forEach(voice => {
                    const opt = document.createElement('option');
                    opt.value = allSystemVoices.indexOf(voice);
                    opt.textContent = `${voice.name.replace(/Microsoft |Google /g, '')} (${voice.lang})`;
                    
                    if (activeLang === 'en' && voice.lang === 'en-US' && (voice.name.toLowerCase().includes('google') || voice.default)) {
                        opt.selected = true;
                    } else if (voice.default && !filteredVoices.some(v => v.lang === 'en-US')) {
                        opt.selected = true;
                    }
                    
                    voiceSelect.appendChild(opt);
                });
            }

            langSelect.addEventListener('change', () => {
                activeLang = langSelect.value;
                isLanguageLocked = true;
                transcriptLine.innerText = `"Anti-Gravity bypassed. Acoustic profile locked to manual selection."`;
                updateVoiceList();
            });

            updateVoiceList();
            if (speechSynthesis.onvoiceschanged !== undefined) {
                speechSynthesis.onvoiceschanged = updateVoiceList;
            }

            function breakTextIntoChunks(text, max = 220) {
                let cleanText = text.replace(/[*#]/g, '');
                const sentences = cleanText.match(/[^.!?;\n]+[.!?;\n]+/g) || [cleanText];
                let chunks = [], current = "";
                for (let s of sentences) {
                    if ((current + s).length > max) {
                        if (current) chunks.push(current.trim());
                        current = s;
                    } else {
                        current += " " + s;
                    }
                }
                if (current) chunks.push(current.trim());
                return chunks.filter(c => c.length > 2);
            }

            function createUtterance(text) {
                const u = new SpeechSynthesisUtterance(text);
                const voiceIndex = voiceSelect.value;
               
                if (allSystemVoices.length && voiceIndex !== "") {
                    u.voice = allSystemVoices[voiceIndex];
                }
                u.lang = u.voice ? u.voice.lang : (activeLang === 'la' ? 'it-IT' : (activeLang === 'nah' ? 'es-MX' : activeLang));
                u.rate = parseFloat(document.getElementById('rate').value);
                u.pitch = parseFloat(document.getElementById('pitch').value);
                u.volume = parseFloat(document.getElementById('volume').value);
                return u;
            }

            function updateUIState(state) {
                ttsState = state;
                if (state === 'playing') {
                    playIcon.innerText = "⏸";
                    playText.innerText = "Pause Sync";
                    statusDisplay.innerText = "TRANSMITTING";
                    statusDisplay.className = "text-[10px] font-bold text-teal-400 uppercase animate-pulse";
                    runVisualizer(true);
                } else if (state === 'paused') {
                    playIcon.innerText = "▶";
                    playText.innerText = "Resume Sync";
                    statusDisplay.innerText = "PAUSED";
                    statusDisplay.className = "text-[10px] font-bold text-amber-500 uppercase";
                    runVisualizer(false);
                } else {
                    playIcon.innerText = "▶";
                    playText.innerText = "Initialize";
                    statusDisplay.innerText = "IDLE";
                    statusDisplay.className = "text-[10px] font-bold text-slate-400 uppercase tracking-widest";
                    runVisualizer(false);
                }
            }

            function processChunks() {
                if (currentChunks.length === 0) {
                    updateUIState('idle');
                    return;
                }
               
                const text = currentChunks.shift();
                currentUtterance = createUtterance(text);
               
                currentUtterance.onend = () => {
                    if (ttsState === 'playing') {
                        processChunks();
                    }
                };
               
                currentUtterance.onerror = (e) => {
                    console.error("TTS Error:", e);
                    updateUIState('idle');
                };
                speechSynthesis.speak(currentUtterance);
            }

            playBtn.addEventListener('click', () => {
                if (ttsState === 'playing') {
                    speechSynthesis.pause();
                    updateUIState('paused');
                    return;
                }
               
                if (ttsState === 'paused') {
                    speechSynthesis.resume();
                    updateUIState('playing');
                    return;
                }
                const text = ttsInput.value.trim();
                if (!text) return;
                speechSynthesis.cancel();
                currentChunks = breakTextIntoChunks(text);
                if(currentChunks.length === 0) return;
                updateUIState('playing');
                processChunks();
            });

            stopBtn.addEventListener('click', () => {
                speechSynthesis.cancel();
                updateUIState('idle');
            });

            ['rate','pitch','volume'].forEach(id => {
                const slider = document.getElementById(id);
                const val = document.getElementById(id + '-val');
                slider.addEventListener('input', () => val.textContent = parseFloat(slider.value).toFixed(2));
            });
        });
    </script>
</body>
</html>
